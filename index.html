<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Tone (Prototype)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400&display=swap" rel="stylesheet">
    <!-- 物理演算エンジン Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- 音楽生成 Web Audio APIラッパー Tone.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="ui-layer">
        <h1>ORBIT TONE</h1>
        <p>画面をなぞって「回転する枠」を描く<br>タップ＆ホールドで「音の玉」を配置する</p>
        <button id="start-btn">Start Audio Experience</button>
    </div>
    
    <button id="mode-btn">Switch Style: Sketch</button>
    <button id="clear-btn">Clear Space</button>
    
    <canvas id="game-canvas"></canvas>
    
    <script src="app.js"></script>
</body>
</html>
